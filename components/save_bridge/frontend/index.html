<!DOCTYPE html>
<html>
<head><meta charset="utf-8"/></head>
<body>
<script>
var params = new URLSearchParams(location.search);
var streamlitUrl = params.get('streamlitUrl');

window.parent.postMessage({
  type: 'streamlit:component-ready',
  streamlitUrl: streamlitUrl,
}, '*');

window.addEventListener('message', function(e) {
  if (e.data && e.data.type === 'segmentacion_guardar') {
    window.parent.postMessage({
      type: 'streamlit:set-component-value',
      value: e.data.payload,
    }, '*');
  }
});
</script>
</body>
</html>
